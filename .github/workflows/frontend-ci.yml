name: Frontend CI

on:
  push:
    branches:
      - main
    

permissions:
  id-token: write
  contents: write

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AWS Authentication (OIDC)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      # Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker Image (FIXED NAME)
      - name: Build Docker Image
        run: |
          docker build \
            -t task5-frontend:${{ github.sha }} \
            ./frontend

      # Tag Image for ECR (FIXED REPO NAME)
      - name: Tag Docker Image
        run: |
          docker tag task5-frontend:${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/task5-frontend:${{ github.sha }}

      # Push Image to ECR (FIXED)
      - name: Push Docker Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/task5-frontend:${{ github.sha }}

      # Update Kubernetes manifest (ArgoCD GitOps)
      - name: Update Staging Rollout Manifest
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/task5-frontend:${{ github.sha }}

          sed -i \
            "s|image: .*|image: ${IMAGE}|g" \
            k8s/staging/frontend-rollout.yaml

      # Commit manifest update
      - name: Commit Manifest Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/staging/frontend-rollout.yaml

          git commit -m "Update frontend image to ${{ github.sha }}" || exit 0

          git push