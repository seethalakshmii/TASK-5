name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  id-token: write
  contents: write

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - run: pytest backend/test-app.py

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        run: |
          docker build \
            -t task5-backend:${{ github.sha }} \
            -t task5-backend:latest \
            ./backend

      - name: Tag Images
        run: |
          docker tag task5-backend:${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/task5-backend:${{ github.sha }}

          docker tag task5-backend:latest \
            ${{ steps.login-ecr.outputs.registry }}/task5-backend:latest

      - name: Push Images
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/task5-backend:${{ github.sha }}

          docker push \
            ${{ steps.login-ecr.outputs.registry }}/task5-backend:latest
            
      - name: Update Staging Manifest
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/task5-backend:${{ github.sha }}

          sed -i \
          "s|image: .*task5-backend:.*|image: ${IMAGE}|g" \
          k8s/staging/backend-rollout.yaml

      - name: Update Prod Manifest
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/task5-backend:${{ github.sha }}

          sed -i \
          "s|image: .*task5-backend:.*|image: ${IMAGE}|g" \
          k8s/prod/backend-rollout.yaml

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add \
            k8s/staging/backend-rollout.yaml \
            k8s/prod/backend-rollout.yaml

          git commit -m "Deploy backend ${{ github.sha }}" || exit 0

          git pull --rebase origin main || true
          git push origin main