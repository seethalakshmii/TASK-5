loki:
  auth_enabled: false

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: task5-loki
      ruler: task5-loki
      admin: task5-loki

    s3:
      region: us-west-1
      s3forcepathstyle: true

  commonConfig:
    replication_factor: 1

deploymentMode: SimpleScalable

write:
  replicas: 1

read:
  replicas: 1

backend:
  replicas: 1

gateway:
  enabled: true

# ✅ IMPORTANT FIX (your current error)
chunksCache:
  enabled: false

resultsCache:
  enabled: true