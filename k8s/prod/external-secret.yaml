apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: mysql-secret
  namespace: project-prod

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore

  target:
    name: mysql-secret
    creationPolicy: Owner

  data:
    - secretKey: username
      remoteRef:
        key: task5-db-secret
        property: username

    - secretKey: password
      remoteRef:
        key: task5-db-secret
        property: password

    - secretKey: host
      remoteRef:
        key: task5-db-secret
        property: host

    - secretKey: database
      remoteRef:
        key: task5-db-secret
        property: database